<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba de Integración Continua</title>
    <style>
        :root {
            --bg-base: #050510;
            --color-primary: #00f2fe;
            --color-secondary: #4facfe;
            --color-accent: #ff0844;
            --text-main: #ffffff;
            --text-muted: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-base);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Prevents scrolling from the blur effect */
        }

        /* Northern Lights Blur Effect */
        .northern-lights {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 50% 50%, rgba(79, 172, 254, 0.15), transparent 60%),
                radial-gradient(circle at 30% 70%, rgba(0, 242, 254, 0.15), transparent 50%),
                radial-gradient(circle at 70% 30%, rgba(255, 8, 68, 0.1), transparent 50%);
            filter: blur(80px);
            z-index: 1;
            animation: auroras 20s ease-in-out infinite alternate;
        }

        @keyframes auroras {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.2); }
            100% { transform: rotate(360deg) scale(1); }
        }

        /* Smooth Dot Pattern Overlay */
        .pattern-overlay {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px);
            background-size: 24px 24px;
            z-index: 2;
        }

        /* Glassmorphism Content Card */
        .content-card {
            position: relative;
            z-index: 3;
            text-align: center;
            padding: 4rem 2rem;
            width: 90%;
            max-width: 650px;
            
            /* Glass effect properties */
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.5),
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            
            /* Entrance animation */
            animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Typography */
        h1 {
            /* clamp() makes the font responsive without media queries */
            font-size: clamp(2rem, 5vw, 3.5rem); 
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 1.5rem;
            
            /* Gradient Text */
            background: linear-gradient(135deg, #fff 0%, var(--text-muted) 50%, var(--color-primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h2 {
            font-size: clamp(1.1rem, 2.5vw, 1.5rem);
            color: var(--text-muted);
            font-weight: 400;
            letter-spacing: 3px;
            text-transform: uppercase;
            position: relative;
            display: inline-block;
        }

        /* Subtle glowing line under the subtitle */
        h2::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 2px;
            background: var(--color-primary);
            box-shadow: 0 0 10px var(--color-primary);
            border-radius: 2px;
        }
    </style>
</head>
<body>

    <div class="northern-lights"></div>
    <div class="pattern-overlay"></div>

    <main class="content-card">
        <h1>Prueba de Integración Continua en AzureDevops</h1>
        <h2>Created by Josue</h2>
    </main>

</body>
</html>
