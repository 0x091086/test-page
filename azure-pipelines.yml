trigger:
  - main

resources:
  - repo: self

variables:
  - group: CICD

parameters:
  - name: imageName
    default: "testpage"

stages:
  - stage: CICD
    displayName: CICD workflow

    jobs:
      - job: Build
        displayName: Build
        pool:
          name: local-agent

        steps:
          - task: Docker@2
            displayName: Build Docker Image
            inputs:
              command: build
              containerRegistry: acrappsjosue
              repository: ${{ parameters.imageName }}
              dockerfile: "**/dockerfile"
              tags: |
                $(Build.BuildId)

          - task: Docker@2
            displayName: Push Docker Image
            inputs:
              command: push
              containerRegistry: acrappsjosue
              repository: ${{ parameters.imageName }}
              tags: |
                $(Build.BuildId)

      - job: Deploy
        displayName: Deploy
        dependsOn: Build
        pool:
          name: local-agent

        steps:
          - task: AzureContainerApps@1
            displayName: Deploy Container App
            inputs:
              azureSubscription: appDeployConnection
              imageToDeploy: acrappsjosue.azurecr.io/${{ parameters.imageName }}:$(Build.BuildId)
              containerAppName: app-testpage
              resourceGroup: rg-devops
              acrUsername: $(acrUsername)
              acrPassword: $(acrPassword)